name: Auto rebuild (pick up new content from main site)

on:
  schedule:
    # Every 6 hours. Adjust to taste (e.g. "0 * * * *" for hourly).
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  trigger-netlify:
    runs-on: ubuntu-latest
    steps:
      - name: Call Netlify build hook
        run: |
          if [ -z "${{ secrets.NETLIFY_BUILD_HOOK }}" ]; then
            echo "::warning::NETLIFY_BUILD_HOOK secret is not set. Add it in repo Settings > Secrets > Actions."
            echo "You can create a Build Hook in Netlify: Site settings > Build & deploy > Build hooks."
            exit 0
          fi
          curl -X POST -sf "${{ secrets.NETLIFY_BUILD_HOOK }}"
